<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(12px);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="url"] {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]::placeholder { color: #64748b; }
    input[type="url"]:focus { border-color: #a78bfa; }

    button {
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.9rem;
      display: none;
    }

    .result-card {
      margin-top: 20px;
      padding: 20px;
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px;
      display: none;
    }
    .result-label {
      font-size: 0.78rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .short-url-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .short-url-link {
      flex: 1;
      font-size: 1.15rem;
      font-weight: 600;
      color: #a78bfa;
      text-decoration: none;
      word-break: break-all;
    }
    .short-url-link:hover { text-decoration: underline; }

    .btn-copy {
      padding: 8px 16px;
      font-size: 0.85rem;
      background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 8px;
      color: #c4b5fd;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: rgba(167,139,250,0.35); }

    .original-url {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #64748b;
      word-break: break-all;
    }

    .stats-row {
      margin-top: 14px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-section {
      margin-top: 28px;
    }
    .history-section h2 {
      font-size: 0.85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      gap: 12px;
      font-size: 0.875rem;
    }
    .history-item .hi-short {
      color: #a78bfa;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .history-item .hi-short:hover { text-decoration: underline; }
    .history-item .hi-original {
      color: #64748b;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-item .hi-clicks {
      color: #94a3b8;
      white-space: nowrap;
      font-size: 0.8rem;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>URL Shortener</h1>
      <p>Shorten any link in seconds</p>
    </header>

    <div class="card">
      <div class="input-row">
        <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" />
        <button id="shortenBtn" onclick="shortenURL()">Shorten</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="result-card" id="resultCard">
        <div class="result-label">Your short link</div>
        <div class="short-url-row">
          <a class="short-url-link" id="shortLink" href="#" target="_blank"></a>
          <button class="btn-copy" onclick="copyURL()">Copy</button>
        </div>
        <div class="original-url" id="originalURL"></div>
        <div class="stats-row">
          <div class="stat">
            <span class="stat-value" id="clickCount">0</span>
            <span class="stat-label">Clicks</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="shortCode">—</span>
            <span class="stat-label">Code</span>
          </div>
        </div>
      </div>

      <div class="history-section" id="historySection" style="display:none">
        <h2>Recent links</h2>
        <ul class="history-list" id="historyList"></ul>
      </div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;

    async function shortenURL() {
      const input = document.getElementById('urlInput');
      const btn   = document.getElementById('shortenBtn');
      const err   = document.getElementById('errorMsg');

      const raw = input.value.trim();
      if (!raw) { showError('Please enter a URL.'); return; }

      btn.innerHTML = '<span class="spinner"></span>Shortening…';
      btn.disabled = true;
      err.style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';

      try {
        const res = await fetch(`${BASE}/api/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: raw }),
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

        displayResult(data);
        loadHistory();
      } catch (e) {
        showError('Network error — please try again.');
      } finally {
        btn.textContent = 'Shorten';
        btn.disabled = false;
      }
    }

    function displayResult(data) {
      document.getElementById('shortLink').href        = data.short_url;
      document.getElementById('shortLink').textContent = data.short_url;
      document.getElementById('originalURL').textContent = data.original_url;
      document.getElementById('clickCount').textContent  = data.click_count;
      document.getElementById('shortCode').textContent   = data.short_code;
      document.getElementById('resultCard').style.display = 'block';
    }

    function copyURL() {
      const url  = document.getElementById('shortLink').href;
      const btn  = document.querySelector('.btn-copy');
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    async function loadHistory() {
      try {
        const res  = await fetch(`${BASE}/api/recent`);
        if (!res.ok) return;
        const list = await res.json();
        if (!list.length) return;

        const ul = document.getElementById('historyList');
        ul.innerHTML = list.map(item => `
          <li class="history-item">
            <a class="hi-short" href="${BASE}/${item.short_code}" target="_blank">
              /${item.short_code}
            </a>
            <span class="hi-original" title="${item.original_url}">${item.original_url}</span>
            <span class="hi-clicks">${item.click_count} click${item.click_count !== 1 ? 's' : ''}</span>
          </li>
        `).join('');
        document.getElementById('historySection').style.display = 'block';
      } catch (_) { /* history is optional */ }
    }

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    // Allow Enter key to trigger shorten
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenURL();
    });

    // Load history on page start
    loadHistory();
  </script>
</body>
</html>
